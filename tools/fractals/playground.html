<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRISM · fractal playground</title>
    <style>
      :root {
        --ink: #0a0e1a;
        --ink2: #16233a;
        --slate: #9aa3b2;
        --paper: #f4f3ee;
        --teal: #4fcbb9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--ink);
        color: var(--paper);
        font: 14px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        gap: 18px 22px;
        flex-wrap: wrap;
        align-items: flex-end;
        padding: 16px 22px;
        background: rgba(10, 14, 26, 0.92);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 { font-size: 15px; font-weight: 500; margin: 0 8px 2px 0; letter-spacing: 0.06em; }
      .ctrl { display: flex; flex-direction: column; gap: 5px; }
      .ctrl label { font-size: 10px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.09em; }
      select, input[type="range"], button {
        background: var(--ink2);
        color: var(--paper);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 7px 10px;
        font: inherit;
      }
      button { cursor: pointer; }
      button:hover { border-color: var(--teal); }
      .hint { padding: 14px 22px 0; color: var(--slate); font-size: 12px; max-width: 820px; }
      .hint code { color: var(--paper); background: var(--ink2); padding: 1px 5px; border-radius: 4px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
        padding: 18px 22px 40px;
      }
      figure { margin: 0; background: #000; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; overflow: hidden; }
      figure canvas { display: block; width: 100%; height: auto; background: var(--ink); }
      figcaption { display: flex; justify-content: space-between; gap: 8px; align-items: center; padding: 8px 11px; font-size: 12px; color: var(--slate); }
      figcaption .cmd { cursor: pointer; color: var(--teal); user-select: none; }
      figcaption .cmd:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <header>
      <h1>PRISM · fractal playground</h1>
      <div class="ctrl"><label>Species</label><select id="species"></select></div>
      <div class="ctrl"><label>Variation <span id="spreadv">0.55</span></label><input id="spread" type="range" min="0" max="1" step="0.01" value="0.55" /></div>
      <div class="ctrl"><label>Palette</label><select id="palette"></select></div>
      <div class="ctrl"><label>Background</label><select id="bg"></select></div>
      <div class="ctrl"><label>Fit</label><select id="fit"></select></div>
      <div class="ctrl"><label>&nbsp;</label><button id="regen">Regenerate &#8635;</button></div>
    </header>
    <p class="hint">Click a seed to copy the exact <code>generate.mjs</code> command that renders it at full resolution. Same seed + settings always reproduce the same image. Must be served over http (see README) — opening the file directly will block module loading.</p>
    <div class="grid" id="grid"></div>

    <script type="module">
      import { makeGenome, speciesNames } from './species.mjs';
      import { renderToRGBA } from './core-render.mjs';

      const PALS = ['prism', 'prism-teal', 'ice', 'mono', 'ember'];
      const BGS = ['ink', 'hero', 'black', 'transparent'];
      const FITS = ['auto', 'cover', 'contain'];
      const COUNT = 12;
      const TW = 240;
      const TH = 360;

      const $ = (id) => document.getElementById(id);
      const opt = (v) => { const o = document.createElement('option'); o.value = o.textContent = v; return o; };
      $('species').append(opt('mix'), ...speciesNames.map(opt));
      PALS.forEach((p) => $('palette').append(opt(p)));
      BGS.forEach((b) => $('bg').append(opt(b)));
      FITS.forEach((f) => $('fit').append(opt(f)));

      let seeds = [];
      const newSeeds = () => { seeds = Array.from({ length: COUNT }, () => Math.floor(Math.random() * 1e9)); };
      const speciesFor = (i) => { const s = $('species').value; return s === 'mix' ? speciesNames[i % speciesNames.length] : s; };

      function renderAll() {
        const grid = $('grid');
        grid.innerHTML = '';
        const spread = +$('spread').value;
        const palette = $('palette').value;
        const bg = $('bg').value;
        const fitSel = $('fit').value;
        const fit = fitSel === 'auto' ? undefined : fitSel;

        seeds.forEach((seed, i) => {
          const sp = speciesFor(i);
          const fig = document.createElement('figure');
          const cv = document.createElement('canvas');
          cv.width = TW;
          cv.height = TH;
          const cap = document.createElement('figcaption');
          const name = document.createElement('span');
          name.textContent = sp;
          const cmd = document.createElement('span');
          cmd.className = 'cmd';
          cmd.title = 'copy full-res command';
          cmd.textContent = seed;
          cap.append(name, cmd);
          fig.append(cv, cap);
          grid.append(fig);

          cmd.onclick = () => {
            const c = `node tools/fractals/generate.mjs --species ${sp} --seeds ${seed} --palette ${palette} --bg ${bg}${fit ? ` --fit ${fit}` : ''} --spread ${spread} --preset hero --contact`;
            navigator.clipboard?.writeText(c);
            cmd.textContent = 'copied ✓';
            setTimeout(() => (cmd.textContent = seed), 1100);
          };

          // stagger so the page stays responsive while the batch renders
          setTimeout(() => {
            const genome = makeGenome(sp, seed, spread);
            const { rgba } = renderToRGBA({ genome, width: TW, height: TH, seed, palette, background: bg, iterations: TW * TH * 4, gamma: 2.2, fit });
            cv.getContext('2d').putImageData(new ImageData(rgba, TW, TH), 0, 0);
          }, i * 25);
        });
      }

      $('spread').addEventListener('input', (e) => ($('spreadv').textContent = (+e.target.value).toFixed(2)));
      ['species', 'palette', 'bg', 'fit', 'spread'].forEach((id) => $(id).addEventListener('change', renderAll));
      $('regen').addEventListener('click', () => { newSeeds(); renderAll(); });

      newSeeds();
      renderAll();
    </script>
  </body>
</html>
